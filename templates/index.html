<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>MovieWall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand" onclick="goHome()">
      <div class="logo">MW</div>
      <h1>MovieWall</h1>
    </div>
    <div class="tools">
      <input id="search" placeholder="搜索电影 / 剧集 / 集数">
      <select id="typeFilter"><option value="all">全部</option><option value="movie">电影</option><option value="show">剧集</option></select>
      <button id="scanBtn">扫描</button>
      <button id="settingsBtn" onclick="renderSettings()" title="设置">⚙</button>
    </div>
  </header>
  <div id="scanBar" class="scan-bar"></div>
  <nav id="tabs" class="tabs"></nav>
  <main id="app"></main>
  <script src="/static/app.js"></script>
</body>
</html>
